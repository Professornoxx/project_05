name: ETL Hourly Sync

on:
  schedule:
    # Matches the retired Workers cron exactly: fires at UTC:00, which is
    # always IST:30 (IST = UTC+5:30) — see common.py's IST day-boundary
    # logic for why that timing matters specifically for the wallet sync.
    - cron: "0 * * * *"
  workflow_dispatch: {}

# A slow run (e.g. a large wallet sync) can still be writing to D1 when the
# next hourly trigger fires. Without this, GitHub would start a second run
# concurrently — two ETL runs racing to upsert the same rows. Queue instead
# of running in parallel; don't cancel the in-progress run since a partial
# ETL write is worse than a late one.
concurrency:
  group: db-ingest
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: etl
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      KV_NAMESPACE_ID: ${{ secrets.KV_NAMESPACE_ID }}
      # MASTER_DB_ID removed: master-db and daily-records-db are merged into
      # one database (daily-records-db) — see sync_engine.py's comment.
      DAILY_DB_ID: ${{ secrets.DAILY_DB_ID }}
      PACKAGE_ID: "10"
      SYNC_WINDOW_DAYS: "5"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Sync deposit + withdraw (5 days incl. today)
        run: python sync_deposit_withdraw.py

      # if: always() — wallet is independent of deposit/withdraw; one
      # source failing shouldn't block another from running, same
      # isolation principle as the retired Workers version (each source
      # got its own try/catch so one failure never blocked the others).
      - name: Sync wallet (1 IST day, day-based logic)
        if: always()
        run: python sync_wallet.py
